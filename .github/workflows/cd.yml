name: CD Pipeline – Deploy NEU Connect

on:
  push:
    branches: [main] # Chỉ chạy khi push/merge vào main

jobs:
  # Job này sẽ build Docker image và push lên Docker Hub
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/neu-connect-rag:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/neu-connect-rag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Bạn có thể thêm bước Deploy (SSH vào server, Pull image, Restart) tại đây
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy Message
        run: echo "Docker image has been pushed. Ready for deployment on server."
